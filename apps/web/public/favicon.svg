  <path fill="#da291c" d="M31 39h18v14c0 7-9 11-9 11s-9-4-9-11z"/>
  <!-- blue quinas (5 dots) -->
  <rect x="37" y="43" width="3.5" height="3.5" fill="#0032a0"/>
  <rect x="43" y="43" width="3.5" height="3.5" fill="#0032a0"/>
  <rect x="37" y="49" width="3.5" height="3.5" fill="#0032a0"/>
  <rect x="43" y="49" width="3.5" height="3.5" fill="#0032a0"/>
  <rect x="40" y="55" width="3.5" height="3.5" fill="#0032a0"/>
